server {
    listen 80;
    server_name vibeadventures.net www.vibeadventures.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name vibeadventures.net www.vibeadventures.net;

    # Ensure these paths match where Docker mounts the volumes
    ssl_certificate /etc/letsencrypt/live/vibeadventures.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vibeadventures.net/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
    try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass api-app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
    }
}