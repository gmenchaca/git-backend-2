name: Test Deploy to EC2

on:
  push:
    branches: [ "jobs" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SSH and Setup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST_JOBS }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY_JOBS }}
          script: |
            # 1. Cleanup and Prepare
            if [ -d "/home/ubuntu/api" ]; then
              cd /home/ubuntu/api
              sudo docker compose down || true
            fi
            sudo rm -rf /home/ubuntu/api
            mkdir -p /home/ubuntu/api
            sudo chown -R ubuntu:ubuntu /home/ubuntu/api

            # 2. Fresh Clone and Env
            cd /home/ubuntu/api
            git clone -b jobs https://github.com/gmenchaca/git-backend-2.git .
            echo "${{ secrets.DOT_ENV_JOBS }}" > .env

            # 3. Pre-start: Create necessary host files
            # Creating these now ensures Docker mounts them correctly
            mkdir -p storage/logs
            touch storage/logs/sync_tours.log
            touch storage/logs/laravel.log

            # 4. Start Containers
            sudo docker compose up -d --build

            # 5. Post-Build Setup
            sleep 5
            sudo docker exec api-app-1 composer install --no-dev --no-interaction --optimize-autoloader
            
            # 6. FIX: Final Permissions
            # We do this once to cover everything: storage, cache, and your new cert
            sudo docker exec -u root api-app-1 chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache
            sudo docker exec -u root api-app-1 chmod -R 775 /var/www/html/storage /var/www/html/bootstrap/cache
            
            # 7. Laravel Optimization
            sudo docker exec api-app-1 php artisan config:cache
            sudo docker exec api-app-1 php artisan route:cache