name: Test Deploy to EC2

on:
  push:
    branches: [ "dev" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SSH and Setup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Enter the directory
            mkdir -p /home/ubuntu/api
            cd /home/ubuntu/api

            # 2. The "Smart Clean" - THIS IS THE MISSING STEP
            # This clears out old code but leaves your SSL certs alone
            find . -maxdepth 1 ! -name 'certbot' ! -name '.' -exec rm -rf {} +

            # 3. Clone fresh (now it will work because the folder is 'empty' enough)
            git clone -b dev https://github.com/gmenchaca/git-backend-2.git .

            # 4. Recreate the .env
            echo "${{ secrets.DOT_ENV_PRODUCTION }}" > .env

            # 5. Build and Run
            docker compose up -d --build