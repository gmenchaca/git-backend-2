name: Test Deploy to EC2

on:
  push:
    branches: [ "dev" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SSH and Setup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Ensure directory exists and move into it
            mkdir -p /home/ubuntu/api
            cd /home/ubuntu/api

            # 2. The "Smart Clean": Delete everything EXCEPT the certbot folder
            # This prevents the "destination path already exists" error
            # while keeping your SSL certificates safe.
            find . -maxdepth 1 ! -name 'certbot' ! -name '.' -exec rm -rf {} +

            # 3. Clone fresh into the current directory
            git clone -b dev https://github.com/gmenchaca/git-backend-2.git .

            # 4. Recreate the .env file
            echo "${{ secrets.DOT_ENV_PRODUCTION }}" > .env

            # 5. Build and Run
            # Using 'sudo' if your EC2 user isn't in the docker group
            docker compose up -d --build