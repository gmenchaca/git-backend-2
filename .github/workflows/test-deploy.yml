name: Test Deploy to EC2

on:
  push:
    branches: [ "dev" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SSH and Setup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Prepare directory without losing certs
            mkdir -p /home/ubuntu/api
            cd /home/ubuntu/api

            # Delete everything EXCEPT the certbot folder
            # This keeps your SSL keys safe
            find . -maxdepth 1 ! -name 'certbot' ! -name '.' -exec rm -rf {} +

            # 2. Clone fresh
            git clone -b dev https://github.com/gmenchaca/git-backend-2.git .

            # 3. Handle the .env file
            echo "${{ secrets.DOT_ENV_PRODUCTION }}" > .env

            # 4. Build and Run
            docker compose up -d --build