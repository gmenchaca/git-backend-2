          script: |
            # 1. Navigate to the app directory
            mkdir -p /home/ubuntu/api
            cd /home/ubuntu/api

            # 2. Pull the latest code (Assuming you've set up an SSH key on the EC2 for GitHub)
            if [ -d ".git" ]; then
              git pull origin dev
            else
              git clone -b dev git@/gmenchaca/git-backend-2.git .
            fi

            # 3. Clean up old containers to save space on your 24.04 instance
            docker compose down --remove-orphans
            docker system prune -f

            # 4. Build and Run
            # This will use the .env file already present on your EC2
            docker compose -f docker-compose-dev.yml up -d --build